version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - '*'
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: daily
    exclude-paths:
      - "LICENSE.txt"
    groups:
      python-requirements:
        patterns:
          - '*'
